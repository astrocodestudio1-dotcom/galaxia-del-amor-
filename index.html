<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>🌌 Galaxia del Amor</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Fondo de estrellas -->
    <canvas id="space"></canvas>

    <!-- Nebulosas -->
    <div id="nebula1"></div>
    <div id="nebula2"></div>
    <div id="nebula3"></div>

    <!-- Galaxia -->
    <div id="galaxy">

        <div class="spiral s1"></div>
        <div class="spiral s2"></div>
        <div class="spiral s3"></div>
        <div class="spiral s4"></div>

        <div class="core"></div>

    </div>

    <!-- Corazón de partículas -->
    <canvas id="heart"></canvas>

    <!-- Frases flotantes -->
    <div id="loveContainer"></div>

    <!-- Halo brillante -->
    <div id="glow"></div>

    <!-- Título principal -->
    <div id="title">

        <span class="shine">✨</span>

        <h1>Te Amo ❤️</h1>

        <h2>En todos los idiomas del universo</h2>

    </div>

    <!-- Destellos -->
    <div id="sparkles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- Capas de profundidad -->
    <div id="layer1"></div>
    <div id="layer2"></div>
    <div id="layer3"></div>

    <!-- Brillo central -->
    <div id="centerGlow"></div>

    <!-- Script -->
    <script src="script.js"></script>

</body>

</html>
