<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxy Pro</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
    c.width = innerWidth;
    c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* =========================
   ESTRELLAS DE FONDO (PRO)
========================= */

const stars = [];
for(let i=0;i<1200;i++){
    stars.push({
        x: Math.random()*innerWidth,
        y: Math.random()*innerHeight,
        s: Math.random()*1.2,
        a: 0.2 + Math.random()*0.8
    });
}

/* =========================
   GALAXIA (ESPIRAL REALISTA)
========================= */

const galaxy = [];
const arms = 4;

for(let i=0;i<1600;i++){
    const arm = i % arms;

    galaxy.push({
        arm,
        r: Math.random()*520,
        angle: Math.random()*Math.PI*2,
        speed: 0.0006 + Math.random()*0.0012,
        size: 1 + Math.random()*1.4
    });
}

/* =========================
   TEXTO (100 IDIOMAS LIMPIO)
========================= */

const words = [
"Te amo","I love you","Je t’aime","Ich liebe dich","Ti amo",
"Eu te amo","Aishiteru","Saranghae","Amor","Love","Forever",
"Mi vida","My love","Soulmate","Eternal love"
];

while(words.length < 100){
    words.push(words[words.length % 15]);
}

const texts = [];
for(let i=0;i<70;i++){
    texts.push({
        arm: i % 4,
        r: 140 + Math.random()*360,
        angle: Math.random()*Math.PI*2,
        speed: 0.0008 + Math.random()*0.0012,
        word: words[Math.floor(Math.random()*words.length)],
        size: 11 + Math.random()*5
    });
}

/* =========================
   LOOP PRINCIPAL
========================= */

function draw(){

    // fondo sólido limpio (NO trails)
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,c.width,c.height);

    const cx = c.width/2;
    const cy = c.height/2;

    /* =========================
       ESTRELLAS
    ========================= */

    ctx.fillStyle = "#ffffff";
    for(let s of stars){
        ctx.globalAlpha = s.a * 0.6;
        ctx.fillRect(s.x, s.y, s.s, s.s);
    }

    /* =========================
       GALAXIA ESPIRAL
    ========================= */

    for(let p of galaxy){

        p.angle += p.speed;

        const armOffset = (p.arm / arms) * Math.PI * 2;

        // espiral más natural
        const spiral = Math.log(p.r + 1) * 1.5;

        const x = cx + Math.cos(p.angle + armOffset + spiral) * p.r;
        const y = cy + Math.sin(p.angle + armOffset + spiral) * p.r * 0.65;

        const alpha = 1 - (p.r / 520);

        ctx.globalAlpha = alpha;
        ctx.fillStyle = "#cfe6ff";

        ctx.fillRect(x, y, p.size, p.size);
    }

    /* =========================
       TEXTO (SATÉLITES CONTROLADOS)
    ========================= */

    ctx.globalAlpha = 0.9;
    ctx.fillStyle = "#ffffff";
    ctx.shadowBlur = 4;
    ctx.shadowColor = "rgba(180,210,255,0.6)";

    for(let t of texts){

        t.angle += t.speed;

        const armOffset = (t.arm/4)*Math.PI*2;
        const spiral = Math.log(t.r + 1) * 1.2;

        const x = cx + Math.cos(t.angle + armOffset + spiral) * t.r;
        const y = cy + Math.sin(t.angle + armOffset + spiral) * t.r * 0.65;

        ctx.font = `${t.size}px Arial`;

        ctx.fillText(t.word, x, y);
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html
